name: Test Azure AI Foundry Connection

on:
  workflow_dispatch:

jobs:
  test-azure-foundry:
    name: Test Azure AI Foundry – GPT-4o & GPT-4o-mini
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Test Azure AI Foundry connection
        env:
          AZURE_FOUNDRY_API_KEY:              ${{ secrets.AZURE_FOUNDRY_API_KEY }}
          AZURE_FOUNDRY_DEPLOYMENT_PRIMARY:   ${{ secrets.AZURE_FOUNDRY_DEPLOYMENT_PRIMARY }}
          AZURE_FOUNDRY_DEPLOYMENT_SECONDARY: ${{ secrets.AZURE_FOUNDRY_DEPLOYMENT_SECONDARY }}
        run: |
          python - <<'EOF'
          import os
          import requests

          api_key   = os.environ["AZURE_FOUNDRY_API_KEY"]
          primary   = os.environ.get("AZURE_FOUNDRY_DEPLOYMENT_PRIMARY",   "gpt-4o")
          secondary = os.environ.get("AZURE_FOUNDRY_DEPLOYMENT_SECONDARY", "gpt-4o-mini")

          base_url  = "https://lre-performance-project-resource.services.ai.azure.com/openai/v1"
          url       = f"{base_url}/chat/completions"

          headers = {
              "api-key": api_key,
              "Content-Type": "application/json"
          }

          all_ok = True
          for model in [primary, secondary]:
              print(f"\n{'='*50}")
              print(f"Testing model: {model}")
              print(f"{'='*50}")
              body = {
                  "model": model,
                  "messages": [{"role": "user", "content": "Say: Connection successful!"}],
                  "max_tokens": 20
              }
              try:
                  r = requests.post(url, headers=headers, json=body, timeout=15)
                  if r.status_code == 200:
                      reply = r.json()["choices"][0]["message"]["content"].strip()
                      print(f"✅  {model} → {reply}")
                  else:
                      print(f"❌  {model} → {r.status_code}: {r.json()}")
                      all_ok = False
              except Exception as e:
                  print(f"❌  {model} → {str(e)}")
                  all_ok = False

          print("\n" + "="*50)
          if all_ok:
              print("✅  Azure AI Foundry connection: BOTH MODELS WORKING")
          else:
              print("⚠️  Azure AI Foundry connection: SOME MODELS FAILED")
          print("="*50)
          EOF
