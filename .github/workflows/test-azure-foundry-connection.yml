name: Test Azure AI Foundry Connection

on:
  workflow_dispatch:

jobs:
  test-azure-foundry:
    name: Test Azure AI Foundry – GPT-4o & GPT-4o-mini
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai>=1.30.0 requests

      - name: Test Azure AI Foundry connection
        env:
          AZURE_FOUNDRY_API_KEY: ${{ secrets.AZURE_FOUNDRY_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          import requests

          api_key  = os.environ["AZURE_FOUNDRY_API_KEY"]

          # Correct endpoint from Azure AI Foundry project page
          base_url = "https://lre-performance-project-resource.services.ai.azure.com/openai/v1"

          models = ["gpt-4o", "gpt-4o-mini"]

          for model in models:
              print(f"\n{'='*50}")
              print(f"Testing model: {model}")
              print(f"{'='*50}")

              url = f"{base_url}/chat/completions"
              headers = {
                  "api-key": api_key,
                  "Content-Type": "application/json"
              }
              body = {
                  "model": model,
                  "messages": [{"role": "user", "content": "Say: Connection successful!"}],
                  "max_tokens": 20
              }

              try:
                  r = requests.post(url, headers=headers, json=body, timeout=15)
                  if r.status_code == 200:
                      reply = r.json()["choices"][0]["message"]["content"].strip()
                      print(f"✅  {model} → {reply}")
                  else:
                      print(f"❌  {model} → {r.status_code}: {r.json()}")
              except Exception as e:
                  print(f"❌  {model} → {str(e)}")

          print("\n✅  Azure AI Foundry connection test complete.")
          EOF
