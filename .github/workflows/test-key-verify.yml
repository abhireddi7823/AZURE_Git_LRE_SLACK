name: Verify Azure AI Foundry Keys

on:
  workflow_dispatch:
    inputs:
      test_key:
        description: 'Paste your API key here to test it directly'
        required: true
        type: string

jobs:
  verify-keys:
    name: Verify API Key
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      # ── Test 1: Using key from workflow_dispatch input ─────────────────
      - name: Test 1 - Key from manual input
        run: |
          python - <<'EOF'
          import requests

          api_key  = "${{ github.event.inputs.test_key }}"
          base_url = "https://lre-performance-project-resource.services.ai.azure.com/openai/v1"
          url      = f"{base_url}/chat/completions"

          print("=" * 50)
          print("Test 1: Key from workflow input")
          print("=" * 50)

          headers = {
              "api-key": api_key,
              "Content-Type": "application/json"
          }
          body = {
              "model": "gpt-4o-mini",
              "messages": [{"role": "user", "content": "Say OK"}],
              "max_tokens": 5
          }
          r = requests.post(url, headers=headers, json=body, timeout=15)
          if r.status_code == 200:
              print(f"✅ Key from input works!")
              print(f"   Response: {r.json()['choices'][0]['message']['content']}")
          else:
              print(f"❌ Failed: {r.status_code} → {r.json().get('error',{}).get('message','?')}")
          EOF

      # ── Test 2: Using key from GitHub Secret ───────────────────────────
      - name: Test 2 - Key from GitHub Secret
        env:
          AZURE_FOUNDRY_API_KEY: ${{ secrets.AZURE_FOUNDRY_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          import requests

          api_key  = os.environ["AZURE_FOUNDRY_API_KEY"]
          base_url = "https://lre-performance-project-resource.services.ai.azure.com/openai/v1"
          url      = f"{base_url}/chat/completions"

          print("=" * 50)
          print("Test 2: Key from GitHub Secret")
          print(f"Key length: {len(api_key)} characters")
          print(f"Key starts with: {api_key[:4]}...")
          print(f"Key ends with:   ...{api_key[-4:]}")
          print("=" * 50)

          headers = {
              "api-key": api_key,
              "Content-Type": "application/json"
          }
          body = {
              "model": "gpt-4o-mini",
              "messages": [{"role": "user", "content": "Say OK"}],
              "max_tokens": 5
          }
          r = requests.post(url, headers=headers, json=body, timeout=15)
          if r.status_code == 200:
              print(f"✅ GitHub Secret key works!")
              print(f"   Response: {r.json()['choices'][0]['message']['content']}")
          else:
              print(f"❌ Failed: {r.status_code} → {r.json().get('error',{}).get('message','?')}")
          EOF

      # ── Test 3: Using Authorization Bearer header ──────────────────────
      - name: Test 3 - Bearer token format
        env:
          AZURE_FOUNDRY_API_KEY: ${{ secrets.AZURE_FOUNDRY_API_KEY }}
        run: |
          python - <<'EOF'
          import os
          import requests

          api_key  = os.environ["AZURE_FOUNDRY_API_KEY"]
          base_url = "https://lre-performance-project-resource.services.ai.azure.com/openai/v1"
          url      = f"{base_url}/chat/completions"

          print("=" * 50)
          print("Test 3: Authorization Bearer header format")
          print("=" * 50)

          # Try Authorization: Bearer header instead of api-key
          headers = {
              "Authorization": f"Bearer {api_key}",
              "Content-Type": "application/json"
          }
          body = {
              "model": "gpt-4o-mini",
              "messages": [{"role": "user", "content": "Say OK"}],
              "max_tokens": 5
          }
          r = requests.post(url, headers=headers, json=body, timeout=15)
          if r.status_code == 200:
              print(f"✅ Bearer token format works!")
              print(f"   Response: {r.json()['choices'][0]['message']['content']}")
          else:
              print(f"❌ Failed: {r.status_code} → {r.json().get('error',{}).get('message','?')}")

          print("\n" + "=" * 50)
          print("All tests complete.")
          print("=" * 50)
          EOF
