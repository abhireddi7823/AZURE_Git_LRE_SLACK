name: LRE Performance Report – Azure Foundry + Slack

on:
  push:
    branches: [main, develop]
    paths:
      - 'reports/**'          # trigger when HTML/trend reports are pushed
  workflow_dispatch:
    inputs:
      report_path:
        description: 'Path to the HTML performance report (e.g. reports/run1/index.html)'
        required: false
        default: 'reports/latest/index.html'
      trend_path:
        description: 'Path to the trend report (e.g. reports/trend.html)'
        required: false
        default: 'reports/trend/trend.html'

# ──────────────────────────────────────────────
# Required GitHub Secrets
# ──────────────────────────────────────────────
# AZURE_FOUNDRY_API_KEY        – Azure AI Foundry key
# AZURE_FOUNDRY_ENDPOINT       – e.g. https://<hub>.openai.azure.com/
# AZURE_FOUNDRY_DEPLOYMENT_PRIMARY    – e.g. gpt-4o
# AZURE_FOUNDRY_DEPLOYMENT_SECONDARY  – e.g. gpt-4o-mini  (fallback)
# SLACK_BOT_TOKEN              – xoxb-... Bot token
# SLACK_CHANNEL_ID             – C0XXXXXXXXX  (channel to post in)
# ──────────────────────────────────────────────

env:
  PRIMARY_MODEL:   ${{ secrets.AZURE_FOUNDRY_DEPLOYMENT_PRIMARY   || 'gpt-4o' }}
  SECONDARY_MODEL: ${{ secrets.AZURE_FOUNDRY_DEPLOYMENT_SECONDARY || 'gpt-4o-mini' }}

jobs:

  # ════════════════════════════════════════════
  # JOB 1 – Analyse reports with Azure AI Foundry
  # ════════════════════════════════════════════
  analyse-and-publish:
    name: Analyse Performance Reports & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # ── 1. Checkout ──────────────────────────
      - name: Checkout AZURE_Git_LRE_SLACK
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history for trend analysis

      # ── 2. Set up Python ─────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # ── 3. Install dependencies ───────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            openai>=1.30.0 \
            beautifulsoup4 \
            lxml \
            requests \
            slack_sdk \
            jinja2 \
            python-dateutil

      # ── 4. Locate latest reports ─────────────
      - name: Locate latest performance reports
        id: find_reports
        run: |
          # Accept manual input or auto-discover the newest HTML report
          MANUAL_HTML="${{ github.event.inputs.report_path }}"
          MANUAL_TREND="${{ github.event.inputs.trend_path }}"

          if [ -n "$MANUAL_HTML" ] && [ -f "$MANUAL_HTML" ]; then
            HTML_REPORT="$MANUAL_HTML"
          else
            HTML_REPORT=$(find reports -name "index.html" -newer /tmp/dummy 2>/dev/null \
              | sort -r | head -1 || find reports -name "*.html" | grep -v trend | sort -r | head -1)
          fi

          if [ -n "$MANUAL_TREND" ] && [ -f "$MANUAL_TREND" ]; then
            TREND_REPORT="$MANUAL_TREND"
          else
            TREND_REPORT=$(find reports -name "trend*.html" 2>/dev/null | sort -r | head -1 || echo "")
          fi

          echo "html_report=${HTML_REPORT}"   >> "$GITHUB_OUTPUT"
          echo "trend_report=${TREND_REPORT}" >> "$GITHUB_OUTPUT"
          echo "::notice::HTML  → ${HTML_REPORT}"
          echo "::notice::Trend → ${TREND_REPORT}"

      # ── 5. Analyse with Azure AI Foundry ─────
      - name: Analyse reports with Azure AI Foundry
        id: ai_analysis
        env:
          AZURE_FOUNDRY_API_KEY:      ${{ secrets.AZURE_FOUNDRY_API_KEY }}
          AZURE_FOUNDRY_ENDPOINT:     ${{ secrets.AZURE_FOUNDRY_ENDPOINT }}
          HTML_REPORT_PATH:           ${{ steps.find_reports.outputs.html_report }}
          TREND_REPORT_PATH:          ${{ steps.find_reports.outputs.trend_report }}
          PRIMARY_DEPLOYMENT:         ${{ env.PRIMARY_MODEL }}
          SECONDARY_DEPLOYMENT:       ${{ env.SECONDARY_MODEL }}
          GITHUB_REPOSITORY:          ${{ github.repository }}
          GITHUB_RUN_ID:              ${{ github.run_id }}
          GITHUB_SERVER_URL:          ${{ github.server_url }}
        run: python scripts/analyse_reports.py

      # ── 6. Publish summary to Slack ──────────
      - name: Publish results to Slack
        env:
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID:  ${{ secrets.SLACK_CHANNEL_ID }}
          SUMMARY_JSON:      ${{ steps.ai_analysis.outputs.summary_json }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID:     ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: python scripts/publish_slack.py

      # ── 7. Upload artefacts ───────────────────
      - name: Upload analysis artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lre-analysis-${{ github.run_number }}
          path: |
            analysis_output/
            reports/
          retention-days: 30
